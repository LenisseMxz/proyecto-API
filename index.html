<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar vehiculo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    #div-formulario {
        margin: 2%;
        padding: 2%;
        border-radius: 10px;
        background-color: #ececf9;
    }
    #div-inputs {
        margin: 2%;
        color: #131339;
        font-family: "Arial Rounded MT", Helvetica, sans-serif;
    }
    #div-btns {
        padding: 2%;
        color: #131339;
        font-family: "Arial Rounded MT", Helvetica, sans-serif;
    }
    .btn {
        background-color: #c6c6ec;
    }
    header {
        margin-top: 2%;
        margin-bottom: 5%;
        padding: 2%;
        border-radius: 10px;
        background-color: #6666cc;
    }
    h1 {
        color: #131339;
        font-family: "Arial Rounded MT", Helvetica, sans-serif;
    }
</style>
<body>
    <header class="container text-center">
        <h1>Agregar vehiculo</h1>
    </header>
    <main class="container text-center">
        <div id="div-formulario" class="row align-items-center">
            <form action="/vehiculos" method="POST" id="formulario">
                <div class="col" id="div-inputs">
                    <label for="placa">Placa:</label>
                    <input type="text" id="placa" name="placa" required>
                </div>
                <div class="col" id="div-inputs">
                    <label for="marca">Marca:</label>
                    <input type="text" id="marca" name="marca" required>
                </div>
                <div class="col" id="div-inputs">
                    <label for="modelo">Modelo:</label>
                    <input type="text" id="modelo" name="modelo" required>
                </div>
                <div id="div-btns">
                    <button type="submit" name="accion" value="agregar" class="btn">Agregar Vehiculo</button>
                    <button type="submit" name="accion" value="listar" class="btn">Listar</button>
                    <button type="submit" name="accion" value="buscar" class="btn">Buscar</button>
                    <button type="submit" name="accion" value="eliminar" class="btn">Eliminar Vehiculo</button>
                </div>
            </form>
        </div>
    </main>
    <div class="cointainer text-center" id="listado"></div>
</body>
<script src="script.js" type="module"></script>
</html>
