<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar vehiculo</title>
</head>
<body>
    <h1>Agregar vehiculo</h1>
    <form action="/api/vehiculos" method="POST">
        <label for="marca">Placa:</label>
        <input type="text" id="marca" name="marca" required><br><br>

        <label for="modelo">Marca:</label>
        <input type="text" id="modelo" name="modelo" required><br><br>

        <label for="anio">Modelo:</label>
        <input type="number" id="anio" name="anio" required><br><br>

       
        <button type="submit">Agregar Vehiculo</button>
        <button type="submit">Listar</button>
        <button type="submit">Buscar</button>
         <button type="submit">Eliminar Vehiculo</button>

    </form>
    
</body>
</html>
