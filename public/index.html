<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar vehiculo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="container text-center">
        <h1>Agregar vehiculo</h1>
    </header>
    <main class="container text-center">
        <div id="div-formulario" class="row align-items-center">
            <form action="/vehiculos" method="POST" id="formulario">
                <div class="col" id="div-inputs">
                    <label for="placa">Placa:</label>
                    <input type="text" id="placa" name="placa" required>
                </div>
                <div class="col" id="div-inputs">
                    <label for="marca">Marca:</label>
                    <input type="text" id="marca" name="marca" required>
                </div>
                <div class="col" id="div-inputs">
                    <label for="modelo">Modelo:</label>
                    <input type="text" id="modelo" name="modelo" required>
                </div>
                <div id="div-btns">
                    <button type="button" id="btnAdd" class="btn">Agregar Vehiculo</button>
                    <button type="button" id="btnListar" class="btn">Listar</button>
                    <button type="button" id="btnBuscar" class="btn">Buscar</button>
                    <button type="button" id="btnEliminar" class="btn">Eliminar Vehiculo</button>
                </div>
            </form>
        </div>
    </main>
    <div class="cointainer text-center" id="listado"></div>
</body>
<script src="script.js" type="module"></script>
</html>
